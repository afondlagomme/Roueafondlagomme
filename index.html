<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roue À Fond La Gomme</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url('fond-roue.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Conteneur pour la roue invisible superposée à l'image */
        #wheel-container {
            position: absolute;
            top: 55%; 
            left: 72%; /* Ajustement pour ton S21 et ton visuel */
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
        }

        #spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px;
            height: 75px;
            background: radial-gradient(#ffcc00, #ff8800);
            border: 4px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            font-size: 14px;
            color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* État désactivé (gris) */
        #spin-btn:disabled { 
            background: #555; 
            color: #888;
            border-color: #444;
            cursor: not-allowed; 
        }

        /* Bouton Google Avis */
        .google-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: #444;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
            font-size: 14px;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: gold;
            padding: 30px;
            border: 4px solid gold;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 200;
            width: 80%;
        }
    </style>
</head>
<body>

    <a href="https://search.google.com/local/writereview?placeid=ChIJi0M9FEcnVQ0R5EybZdnYmHU" target="_blank" class="google-link" onclick="enableSpin()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
        1. LAISSE TON AVIS POUR JOUER !
    </a>

    <div id="wheel-container">
        <button id="spin-btn" disabled>TIRE !</button>
        <div id="wheel"></div>
    </div>

    <div id="popup" class="popup">
        <h2 id="win-text"></h2>
        <p>Prends une capture d'écran et montre-la à l'accueil !</p>
        <button onclick="location.reload()" style="padding:10px 20px; background:gold; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">REJOUER</button>
    </div>

<script>
    const wheel = document.getElementById('wheel');
    const btn = document.getElementById('spin-btn');
    const popup = document.getElementById('popup');
    const winText = document.getElementById('win-text');

    // Débloque le bouton après le clic
    function enableSpin() {
        setTimeout(() => {
            btn.disabled = false;
            btn.style.boxShadow = "0 0 30px gold";
            btn.innerText = "TOURNE !";
        }, 1000);
    }

    // Gains correspondant aux 6 segments de ton image
    const rewards = ["10%", "5%", "10%", "15%", "20%", "PERDU"];

    btn.addEventListener('click', () => {
        btn.disabled = true;
        const randomRotation = Math.floor(Math.random() * 360) + 3600; 
        wheel.style.transform = `rotate(${randomRotation}deg)`;

        setTimeout(() => {
            // Calcul précis pour 6 segments de 60 degrés
            const actualAngle = (360 - (randomRotation % 360)) % 360;
            const prizeIndex = Math.floor(actualAngle / 60);
            
            winText.innerText = "BRAVO ! TU AS GAGNÉ : " + rewards[prizeIndex];
            popup.style.display = 'block';
        }, 4000);
    });
</script>

</body>
</html>
