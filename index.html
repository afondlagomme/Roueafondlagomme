<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roue À Fond La Gomme</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url('fond-roue.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Conteneur pour aligner la roue invisible sur la roue du dessin */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #wheel-container {
            position: absolute;
            /* Ces valeurs sont à ajuster pour que la roue soit pile sur l'image */
            top: 55%; 
            left: 72%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Les textes des gains */
        .segment {
            position: absolute;
            width: 50%;
            height: 2px;
            top: 50%;
            left: 50%;
            transform-origin: left center;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            color: #fff;
            font-size: 20px;
            text-shadow: 2px 2px 5px #000;
        }

        #spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(#ffcc00, #ff8800);
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #spin-btn:disabled { background: #555; }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: gold;
            padding: 30px;
            border: 4px solid gold;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="wheel-container">
        <button id="spin-btn">TIRE !</button>
        <div id="wheel">
            <div class="segment" style="transform: rotate(30deg) translate(20px);"><span>10%</span></div>
            <div class="segment" style="transform: rotate(90deg) translate(20px);"><span>PERDU</span></div>
            <div class="segment" style="transform: rotate(150deg) translate(20px);"><span>20%</span></div>
            <div class="segment" style="transform: rotate(210deg) translate(20px);"><span>15%</span></div>
            <div class="segment" style="transform: rotate(270deg) translate(20px);"><span>10%</span></div>
            <div class="segment" style="transform: rotate(330deg) translate(20px);"><span>5%</span></div>
        </div>
    </div>
</div>

<div id="popup" class="popup">
    <h2 id="win-text"></h2>
    <p>Prends une capture d'écran et montre-la au comptoir !</p>
    <button onclick="location.reload()" style="padding:10px; background:gold; border:none; border-radius:5px; cursor:pointer;">Rejouer</button>
</div>

<script>
    const wheel = document.getElementById('wheel');
    const btn = document.getElementById('spin-btn');
    const popup = document.getElementById('popup');
    const winText = document.getElementById('win-text');

    const rewards = ["10%", "5%", "10%", "15%", "20%", "PERDU"];

    btn.addEventListener('click', () => {
        btn.disabled = true;
        const randomSpin = Math.floor(Math.random() * 360) + 3600; 
        wheel.style.transform = `rotate(${randomSpin}deg)`;

        setTimeout(() => {
            const actualDeg = randomSpin % 360;
            const prizeIndex = Math.floor(actualDeg / 60);
            winText.innerText = "BRAVO ! TU AS GAGNÉ : " + rewards[prizeIndex];
            popup.style.display = 'block';
        }, 4000);
    });
</script>

</body>
</html>
