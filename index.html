<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>À Fond la Gomme - Roue</title>

<style>
body {
font-family: Arial;
text-align:center;
background:#0f0f0f;
color:white;
padding:20px;
}

h1 {
color:#FFD000;
font-size:34px;
text-shadow:0 0 15px #ffae00;
}

.subtitle {
font-size:18px;
margin-bottom:20px;
}

#wheel {
width:320px;
height:320px;
border-radius:50%;
border:12px solid #FFD000;
margin:30px auto;
box-shadow:0 0 40px rgba(255,208,0,0.7);
transition: transform 4s cubic-bezier(.17,.67,.83,.67);
background: conic-gradient(
#ffd000 0deg 60deg,
#ff9d00 60deg 120deg,
#ff6a00 120deg 180deg,
#ff3b00 180deg 240deg,
#ffd000 240deg 300deg,
#222 300deg 360deg
);
}

#pointer {
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-bottom:50px solid #FFD000;
margin:auto;
}

button {
padding:14px 26px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;
font-weight:bold;
}

.reviewBtn {
background:#ff3b00;
color:white;
}

.spinBtn {
background:#FFD000;
color:black;
}

.result {
font-size:26px;
margin-top:20px;
font-weight:bold;
color:#FFD000;
text-shadow:0 0 10px #ffae00;
}

</style>
</head>

<body>

<h1>À FOND LA GOMME</h1>

<p class="subtitle">🎁 Tente ta chance et gagne une remise immédiate</p>

<p>1️⃣ Laisse ton avis Google</p>

<a href="https://www.google.com/search?q=avis+a+fond+la+gomme" target="_blank">
<button class="reviewBtn">Laisser un avis</button>
</a>

<p>2️⃣ Clique pour jouer</p>

<button onclick="enableSpin()" id="unlock" class="spinBtn">J'ai laissé un avis</button>

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spinWheel()" id="spin" disabled class="spinBtn">TOURNER LA ROUE</button>

<div class="result" id="result"></div>

<script>

let wheel = document.getElementById("wheel");
let result = document.getElementById("result");
let spinButton = document.getElementById("spin");

// 🎯 PROBABILITÉS
let rewards = [
"5%","5%","5%",
"10%","10%",
"15%",
"20%",
"Perdu"
];

function enableSpin(){
spinButton.disabled = false;
alert("🎁 Tu peux maintenant tourner la roue !");
}

function spinWheel(){

spinButton.disabled = true;

// tirage pondéré
let rand = Math.floor(Math.random() * rewards.length);

// rotation
let deg = 3600 + (rand * (360 / rewards.length));

wheel.style.transform = "rotate("+deg+"deg)";

setTimeout(()=>{

let gain = rewards[rand];

if(gain === "Perdu"){
result.innerHTML = "😢 Dommage, retente ta chance la prochaine fois !";
}else{
result.innerHTML = "🎉 Bravo ! Tu gagnes -" + gain;
}

// 🎉 petit effet
confetti();

},4000);
}

// confetti simple
function confetti(){
for(let i=0;i<80;i++){
let div = document.createElement("div");
div.style.position = "fixed";
div.style.width = "5px";
div.style.height = "5px";
div.style.background = "yellow";
div.style.top = Math.random()*window.innerHeight+"px";
div.style.left = Math.random()*window.innerWidth+"px";
document.body.appendChild(div);

setTimeout(()=>{div.remove();},1500);
}
}

</script>

</body>
</html>
