<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue À Fond La Gomme</title>

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial Black;
}

/* IMAGE FOND */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('fond-roue.png') center/contain no-repeat;
}

/* ZONE CLIQUABLE GOOGLE */
#google {
    position: absolute;
    bottom: 6%;
    left: 6%;
    width: 28%;
    height: 14%;
    cursor: pointer;
}

/* ROUE */
#wheel-container {
    position: absolute;
    top: 55%;
    left: 72%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
}

#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
}

/* BOUTON */
#spin {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: gold;
    border: 4px solid white;
    font-weight: bold;
    cursor: pointer;
}

#spin:disabled {
    background: gray;
}

/* POPUP */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: black;
    color: gold;
    padding: 30px;
    border: 3px solid gold;
    border-radius: 15px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="background"></div>

<div id="google"></div>

<div id="wheel-container">
    <button id="spin" disabled>AVIS</button>
    <div id="wheel"></div>
</div>

<div id="popup">
    <h2 id="result"></h2>
    <button onclick="location.reload()">REJOUER</button>
</div>

<script>
const spinBtn = document.getElementById("spin");
const wheel = document.getElementById("wheel");
const popup = document.getElementById("popup");
const result = document.getElementById("result");

/* 🔒 BLOQUE SI DEJA JOUE */
if(localStorage.getItem("played")){
    spinBtn.disabled = true;
    spinBtn.innerText = "DÉJÀ JOUÉ";
}

/* 🔗 LIEN GOOGLE (FIABLE MOBILE) */
document.getElementById("google").onclick = () => {

    const url = "https://search.google.com/local/writereview?placeid=ChIJi0M9FEcnVQ0R5EybZdnYmHU";

    window.location.href = url;

    setTimeout(()=>{
        spinBtn.disabled = false;
        spinBtn.innerText = "TOURNE";
    },1500);
};

/* 🎯 PROBABILITÉS */
const rewards = [
    {text:"5%", weight:50},
    {text:"10%", weight:30},
    {text:"15%", weight:10},
    {text:"20%", weight:3},
    {text:"PERDU", weight:7}
];

function getReward(){
    let total = rewards.reduce((a,b)=>a+b.weight,0);
    let rand = Math.random()*total;

    for(let r of rewards){
        if(rand < r.weight) return r.text;
        rand -= r.weight;
    }
}

/* 🎡 ANGLES */
const angles = {
    "5%": 30,
    "10%": 90,
    "15%": 150,
    "20%": 210,
    "PERDU": 300
};

/* 🎰 SPIN */
spinBtn.onclick = () => {

    spinBtn.disabled = true;

    let gain = getReward();

    let rotation = 3600 + angles[gain];

    wheel.style.transform = "rotate("+rotation+"deg)";

    setTimeout(()=>{
        result.innerText = "🎉 BRAVO - " + gain;
        popup.style.display = "block";
        localStorage.setItem("played", "true");
    },4000);
};
</script>

</body>
</html>
