<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>À Fond la Gomme - Roue Premium</title>

<style>
body {
font-family: Arial;
text-align:center;
background:#0f0f0f;
color:white;
padding:20px;
}

h1 {
color:#FFD000;
font-size:34px;
text-shadow:0 0 15px #ffae00;
}

.subtitle {
font-size:18px;
margin-bottom:20px;
}

#wheel {
width:320px;
height:320px;
border-radius:50%;
border:12px solid #FFD000;
margin:30px auto;
box-shadow:0 0 40px rgba(255,208,0,0.7);
transition: transform 4s cubic-bezier(.17,.67,.83,.67);
background: conic-gradient(
#ffd000 0deg 72deg,
#ff9d00 72deg 144deg,
#ff6a00 144deg 216deg,
#ff3b00 216deg 288deg,
#ffd000 288deg 360deg
);
}

#pointer {
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-bottom:50px solid #FFD000;
margin:auto;
}

button {
padding:14px 26px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;
font-weight:bold;
}

.reviewBtn {
background:#ff3b00;
color:white;
}

.spinBtn {
background:#FFD000;
color:black;
}

input {
padding:10px;
margin-top:15px;
border-radius:5px;
border:none;
width:250px;
text-align:center;
}

.result {
font-size:26px;
margin-top:20px;
font-weight:bold;
color:#FFD000;
text-shadow:0 0 10px #ffae00;
}

.hidden {
display:none;
}

</style>
</head>

<body>

<h1>À FOND LA GOMME</h1>

<p class="subtitle">🎁 Tente ta chance et obtiens une remise immédiate</p>

<!-- ETAPE 1 -->
<p>1️⃣ Laisse ton avis Google</p>

<a href="https://www.google.com/search?q=avis+a+fond+la+gomme" target="_blank">
<button class="reviewBtn">Laisser un avis</button>
</a>

<!-- ETAPE 2 -->
<p>2️⃣ Entre ton numéro pour valider</p>
<input type="tel" id="phone" placeholder="Ton numéro">

<br>

<button onclick="validateStep()" class="spinBtn">Valider</button>

<div id="game" class="hidden">

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spinWheel()" id="spin" class="spinBtn">TOURNER LA ROUE</button>

</div>

<div class="result" id="result"></div>

<script>

let wheel = document.getElementById("wheel");
let result = document.getElementById("result");

let rewards = [
"-5€","-5€","-5€","-5€",
"-10€","-10€","-10€",
"-15€",
"-20€"
];

// 🔒 BLOQUER 1 TOUR PAR TEL
if(localStorage.getItem("played")){
document.body.innerHTML = "<h1>⚠️ Déjà utilisé</h1><p>Offre valable une seule fois</p>";
}

// VALIDATION
function validateStep(){
let phone = document.getElementById("phone").value;

if(phone.length < 8){
alert("Entre un numéro valide");
return;
}

document.getElementById("game").classList.remove("hidden");
alert("🎁 Tu peux maintenant tourner la roue !");
}

// 🎡 SPIN
function spinWheel(){

document.getElementById("spin").disabled = true;

// PROBA BOOST
let rand = Math.floor(Math.random() * rewards.length);

// rotation réaliste
let deg = 3600 + (rand * (360 / rewards.length));

wheel.style.transform = "rotate("+deg+"deg)";

// 🎉 RESULTAT
setTimeout(()=>{

let gain = rewards[rand];

result.innerHTML = "🎉 Bravo ! Tu gagnes " + gain;

// 🎊 CONFETTI
confettiEffect();

// 🔒 BLOQUER
localStorage.setItem("played", "yes");

},4000);

}

// 🎉 CONFETTI
function confettiEffect(){
for(let i=0;i<100;i++){
let div = document.createElement("div");
div.style.position = "fixed";
div.style.width = "6px";
div.style.height = "6px";
div.style.background = "yellow";
div.style.top = Math.random()*window.innerHeight+"px";
div.style.left = Math.random()*window.innerWidth+"px";
div.style.opacity = Math.random();
div.style.zIndex = 999;
document.body.appendChild(div);

setTimeout(()=>{div.remove();},2000);
}
}

</script>

</body>
</html>
