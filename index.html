<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue À Fond La Gomme</title>

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
    font-family: Arial Black;
}

/* IMAGE FOND */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('fond-roue.png') center/contain no-repeat;
}

/* ZONE AVIS */
#google-zone {
    position: absolute;
    bottom: 20%;
    left: 4%;
    width: 38%;
    height: 16%;
    z-index: 10;
    cursor: pointer;
}

/* CANVAS ROUE */
#wheelCanvas {
    position: absolute;
    top: 55%;
    left: 72%;
    transform: translate(-50%, -50%);
}

/* BOUTON */
#spin {
    position: absolute;
    top: 55%;
    left: 72%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: gold;
    border: 5px solid white;
    font-weight: bold;
    cursor: pointer;
}

#spin:disabled {
    background: gray;
}

/* POPUP */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: black;
    color: gold;
    padding: 30px;
    border: 3px solid gold;
    border-radius: 15px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="background"></div>

<div id="google-zone"></div>

<canvas id="wheelCanvas" width="320" height="320"></canvas>
<button id="spin" disabled>AVIS</button>

<div id="popup">
    <h2 id="result"></h2>
    <p>📸 Capture et montre à l'accueil</p>
</div>

<script>
const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spin");
const popup = document.getElementById("popup");
const result = document.getElementById("result");

/* 🎯 GAINS (cachés visuellement) */
const segments = ["", "", "", "", ""]; // vide = caché

const rewards = [
    {text:"5%", weight:50},
    {text:"10%", weight:30},
    {text:"15%", weight:10},
    {text:"20%", weight:3},
    {text:"PERDU", weight:7}
];

let angle = 0;
let spinning = false;

/* 🎨 DESSIN ROUE */
function drawWheel() {
    let arc = Math.PI * 2 / segments.length;

    for(let i=0;i<segments.length;i++){
        ctx.beginPath();
        ctx.fillStyle = i % 2 === 0 ? "#d32f2f" : "#111";
        ctx.moveTo(160,160);
        ctx.arc(160,160,150, i*arc + angle, (i+1)*arc + angle);
        ctx.fill();
    }
}

drawWheel();

/* 🎲 PROBA */
function getReward(){
    let total = rewards.reduce((a,b)=>a+b.weight,0);
    let rand = Math.random()*total;

    for(let r of rewards){
        if(rand < r.weight) return r.text;
        rand -= r.weight;
    }
}

/* 🎰 ANIMATION REALISTE */
function spinWheel(targetIndex){

    let arc = 360 / segments.length;
    let targetAngle = (360 * 5) + (targetIndex * arc); // plusieurs tours

    let current = 0;

    function animate(){
        current += (targetAngle - current) * 0.05; // ralentissement progressif

        angle = current * Math.PI / 180;

        ctx.clearRect(0,0,320,320);
        drawWheel();

        if(Math.abs(targetAngle - current) > 0.5){
            requestAnimationFrame(animate);
        } else {
            finish();
        }
    }

    animate();
}

/* FIN */
function finish(){
    let gain = currentGain;
    result.innerText = "🎉 BRAVO - " + gain;
    popup.style.display = "block";
    localStorage.setItem("played","true");
}

/* 🔒 déjà joué */
if(localStorage.getItem("played")){
    spinBtn.disabled = true;
    spinBtn.innerText = "DÉJÀ JOUÉ";
}

/* CLICK AVIS */
document.getElementById("google-zone").onclick = () => {

    window.open("https://g.page/r/CeRMm2XZ2Jh1EAE/review", "_blank");

    setTimeout(()=>{
        spinBtn.disabled = false;
        spinBtn.innerText = "TOURNE";
    },1500);
};

/* SPIN */
let currentGain;

spinBtn.onclick = () => {

    spinBtn.disabled = true;

    currentGain = getReward();

    let index = Math.floor(Math.random()*5);

    spinWheel(index);
};
</script>

</body>
</html>
