<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue À Fond La Gomme</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial Black;
}

/* IMAGE */
.background {
    position: relative;
    width: 100%;
    height: 100vh;
    background: url('fond-roue.png') center/contain no-repeat;
}

/* ZONE AVIS */
#google-zone {
    position: absolute;
    bottom: 25%;
    left: 8%;
    width: 44%;
    height: 12%;
    cursor: pointer;
}

/* ROUE */
#wheelCanvas {
    position: absolute;
    top: 53%;
    left: 76%;
    transform: translate(-50%, -50%);
    width: 155px;
    height: 155px;
}

/* BOUTON */
#spin {
    position: absolute;
    top: 53%;
    left: 76%;
    transform: translate(-50%, -50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(#ffd700, #ff8c00);
    border: 3px solid white;
    font-weight: bold;
    cursor: pointer;
    font-size: 11px;
}

/* POPUP */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: black;
    color: gold;
    padding: 25px;
    border: 3px solid gold;
    border-radius: 15px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="background">

    <div id="google-zone"></div>

    <canvas id="wheelCanvas" width="155" height="155"></canvas>
    <button id="spin" disabled>AVIS</button>

</div>

<div id="popup">
    <h2 id="result"></h2>
    <p>📸 Fais une capture et montre à l'accueil</p>
</div>

<script>
const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spin");
const popup = document.getElementById("popup");
const result = document.getElementById("result");

/* 🎯 CONFIG */
const segments = 8;

/* 🎨 ROUE */
function drawWheel() {
    let size = 77;
    let center = 77;
    let arc = Math.PI * 2 / segments;

    for(let i=0;i<segments;i++){
        ctx.beginPath();
        ctx.fillStyle = i % 2 === 0 ? "#d32f2f" : "#111";
        ctx.moveTo(center, center);
        ctx.arc(center, center, size, i*arc, (i+1)*arc);
        ctx.fill();
    }
}
drawWheel();

/* 🎲 PROBABILITÉS (IMPORTANT) */
const rewards = [
    "5€","5€","5€","10€","10€","10€","15€","20€"
];

/* 🎰 SPIN */
spinBtn.onclick = () => {

    spinBtn.disabled = true;

    let gain = rewards[Math.floor(Math.random()*rewards.length)];

    let rotation = 3600 + Math.random()*360;

    canvas.style.transition = "transform 4s cubic-bezier(0.1,0.7,0.1,1)";
    canvas.style.transform = "translate(-50%, -50%) rotate("+rotation+"deg)";

    setTimeout(()=>{
        result.innerText = "🎉 BRAVO - " + gain + " DE REMISE";
        popup.style.display = "block";
        localStorage.setItem("played","true");
    }, 4000);
};

/* BLOQUAGE */
if(localStorage.getItem("played")){
    spinBtn.disabled = true;
    spinBtn.innerText = "DÉJÀ JOUÉ";
}

/* GOOGLE */
document.getElementById("google-zone").onclick = () => {
    window.open("https://g.page/r/CeRMm2XZ2Jh1EAE/review", "_blank");

    setTimeout(()=>{
        spinBtn.disabled = false;
        spinBtn.innerText = "TOURNE";
    }, 1200);
};
</script>

</body>
</html>
