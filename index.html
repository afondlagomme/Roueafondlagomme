<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ГЂ Fond la Gomme - Roue</title>

<style>
body {
font-family: Arial;
text-align:center;
background:#0f0f0f;
color:white;
padding:20px;
}

h1 {
color:#FFD000;
font-size:34px;
text-shadow:0 0 10px #ffae00;
}

.subtitle {
font-size:18px;
margin-bottom:20px;
}

#wheel {
width:320px;
height:320px;
border-radius:50%;
border:12px solid #FFD000;
margin:30px auto;
box-shadow:0 0 30px rgba(255,208,0,0.6);
transition: transform 4s cubic-bezier(.17,.67,.83,.67);
background: conic-gradient(
#ffd000 0deg 72deg,
#ff9d00 72deg 144deg,
#ff6a00 144deg 216deg,
#ff3b00 216deg 288deg,
#ffd000 288deg 360deg
);
}

#pointer {
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-bottom:50px solid #FFD000;
margin:auto;
}

button {
padding:14px 26px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;
font-weight:bold;
}

.reviewBtn {
background:#ff3b00;
color:white;
}

.spinBtn {
background:#FFD000;
color:black;
}

.result {
font-size:26px;
margin-top:20px;
font-weight:bold;
color:#FFD000;
text-shadow:0 0 10px #ffae00;
}

</style>
</head>

<body>

<h1>ГЂ FOND LA GOMME</h1>

<p class="subtitle">рџЋЃ Tente ta chance et obtiens une remise immГ©diate</p>

<p>1пёЏвѓЈ Laisse ton avis Google</p>

<a href="https://www.google.com/search?q=avis+a+fond+la+gomme" target="_blank">
<button class="reviewBtn">Laisser un avis</button>
</a>

<p>2пёЏвѓЈ Confirme pour dГ©bloquer la roue</p>

<button onclick="enableSpin()" class="spinBtn">J'ai laissГ© un avis</button>

<div id="pointer"></div>
<div id="wheel"></div>

<button onclick="spinWheel()" id="spin" disabled class="spinBtn">TOURNER LA ROUE</button>

<div class="result" id="result"></div>

<script>

let wheel = document.getElementById("wheel");
let result = document.getElementById("result");
let spinButton = document.getElementById("spin");

// рџЋЇ PROBABILITГ‰S (plus de -5 et -10)
let rewards = [
"-5в‚¬","-5в‚¬","-5в‚¬",
"-10в‚¬","-10в‚¬","-10в‚¬",
"-15в‚¬",
"-20в‚¬"
];

function enableSpin(){
spinButton.disabled = false;
alert("Merci ! Tu peux maintenant tourner la roue рџЋЃ");
}

function spinWheel(){
spinButton.disabled = true;

// tirage pondГ©rГ©
let rand = Math.floor(Math.random() * rewards.length);

// calcul rotation
let deg = 3600 + (rand * (360 / rewards.length));

wheel.style.transform = "rotate("+deg+"deg)";

setTimeout(()=>{
result.innerHTML = "рџЋ‰ Bravo ! Tu gagnes " + rewards[rand];
},4000);
}

</script>

</body>
</html>
