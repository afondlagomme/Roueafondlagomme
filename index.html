<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue À Fond La Gomme</title>

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
    font-family: Arial Black;
}

/* IMAGE FOND */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('fond-roue.png') center/contain no-repeat;
}

/* ZONE CLIQUABLE AVIS */
#google-zone {
    position: absolute;
    bottom: 22%;
    left: 4%;
    width: 40%;
    height: 18%;
    z-index: 10;
    cursor: pointer;
}

/* ROUE PARFAITEMENT AJUSTÉE */
#wheelCanvas {
    position: absolute;
    top: 52%;
    left: 70%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
}

/* BOUTON */
#spin {
    position: absolute;
    top: 52%;
    left: 70%;
    transform: translate(-50%, -50%);
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: radial-gradient(#ffd700, #ff8c00);
    border: 3px solid white;
    font-weight: bold;
    cursor: pointer;
    font-size: 12px;
}

/* POPUP */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: black;
    color: gold;
    padding: 30px;
    border: 3px solid gold;
    border-radius: 15px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="background"></div>

<div id="google-zone"></div>

<canvas id="wheelCanvas" width="180" height="180"></canvas>
<button id="spin" disabled>AVIS</button>

<div id="popup">
    <h2 id="result"></h2>
    <p>📸 Fais une capture et montre à l'accueil</p>
</div>

<script>
const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spin");
const popup = document.getElementById("popup");
const result = document.getElementById("result");

/* 🎯 CONFIG */
const segments = 8;
let angle = 0;

/* 🎨 DESSIN ROUE */
function drawWheel() {
    let size = 90;
    let center = 90;
    let arc = Math.PI * 2 / segments;

    for(let i=0;i<segments;i++){
        ctx.beginPath();
        ctx.fillStyle = i % 2 === 0 ? "#d32f2f" : "#111";
        ctx.moveTo(center, center);
        ctx.arc(center, center, size, i*arc + angle, (i+1)*arc + angle);
        ctx.fill();
    }
}

drawWheel();

/* 🎲 GAINS */
const rewards = [
    "5%","5%","10%","10%","15%","20%","PERDU","5%"
];

/* 🎰 SPIN */
spinBtn.onclick = () => {

    spinBtn.disabled = true;

    let gain = rewards[Math.floor(Math.random()*rewards.length)];

    let rotation = 3600 + Math.random()*360;

    canvas.style.transition = "transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)";
    canvas.style.transform = "translate(-50%, -50%) rotate(" + rotation + "deg)";

    setTimeout(()=>{
        result.innerText = "🎉 BRAVO - " + gain;
        popup.style.display = "block";
        localStorage.setItem("played","true");
    }, 4000);
};

/* 🔒 BLOQUER MULTI-JEU */
if(localStorage.getItem("played")){
    spinBtn.disabled = true;
    spinBtn.innerText = "DÉJÀ JOUÉ";
}

/* ⭐ GOOGLE AVIS */
document.getElementById("google-zone").onclick = () => {

    window.open("https://g.page/r/CeRMm2XZ2Jh1EAE/review", "_blank");

    setTimeout(()=>{
        spinBtn.disabled = false;
        spinBtn.innerText = "TOURNE";
    }, 1200);
};
</script>

</body>
</html>
